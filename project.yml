name: Fullball
options:
  bundleIdPrefix: com.fullball
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: YES
    SWIFT_EMIT_LOC_STRINGS: NO
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
targets:
  Fullball:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Fullball
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseStorage
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.juanledesma.Fulbo.app
        TARGETED_DEVICE_FAMILY: "1"   # iPhone only (target-level overrides the universal default)
        INFOPLIST_KEY_CFBundleDisplayName: Fullball Manager
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO   # only HTTPS/Firebase (exempt standard crypto); skips ASC export-compliance prompt
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: Fullball/Fullball.entitlements
  FullballTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FullballTests
    dependencies:
      - target: Fullball
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fullball.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Fullball:
    build:
      targets:
        Fullball: all
        FullballTests: [test]
    test:
      targets:
        - FullballTests
